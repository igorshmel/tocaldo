<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Planner</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body class="h-screen bg-[#fffaed] text-[#555] flex items-center justify-center p-5 [font-family:'Segoe_UI',Roboto,Helvetica,Arial,sans-serif]">

<div class="planner-container w-full max-w-[1400px] h-[95vh] grid grid-cols-[300px_1fr] bg-[#fff7ea] shadow-[0_10px_30px_rgba(0,0,0,0.05)] rounded-[8px] overflow-hidden border border-[#e3dbce] [user-select:none] [-webkit-user-select:none]">
    <aside class="sidebar bg-[#fff7ea] border-r border-[#e3dbce] px-5 py-[25px] flex flex-col justify-between h-full overflow-y-auto z-20">
        <!-- BACKLOG SECTION -->
        <div class="sidebar-group">
            <div class="section-header bg-[#f3e1cb] p-3 text-center font-semibold uppercase tracking-[1.5px] mb-5 rounded-[2px] text-[#555] text-[0.95rem]">Backlog</div>
            <div class="backlog-actions flex gap-2 mt-[-6px] mb-4">
                <button type="button" class="backlog-btn peach appearance-none border-0 rounded-[4px] py-2 px-3 text-[0.72rem] font-normal uppercase tracking-[1px] cursor-pointer shadow-[0_2px_5px_rgba(0,0,0,0.1)] flex-1 text-center bg-[#ffddc4] text-[#555] hover:brightness-[0.98] active:brightness-[0.96]" data-type="peach">Work</button>
                <button type="button" class="backlog-btn green appearance-none border-0 rounded-[4px] py-2 px-3 text-[0.72rem] font-normal uppercase tracking-[1px] cursor-pointer shadow-[0_2px_5px_rgba(0,0,0,0.1)] flex-1 text-center bg-[#e2e3d1] text-[#555] hover:brightness-[0.98] active:brightness-[0.96]" data-type="green">Self</button>
                <button type="button" class="backlog-btn yellow appearance-none border-0 rounded-[4px] py-2 px-3 text-[0.72rem] font-normal uppercase tracking-[1px] cursor-pointer shadow-[0_2px_5px_rgba(0,0,0,0.1)] flex-1 text-center bg-[#d7f1f6] text-[#555] hover:brightness-[0.98] active:brightness-[0.96]" data-type="yellow">Family</button>
            </div>
            <!-- Dynamic Backlog Container -->
            <div id="backlogContainer" class="backlog-area flex flex-col gap-2.5 min-h-[100px] pb-5"></div>
        </div>

        <div class="sidebar-group">
            <div class="section-header bg-[#f3e1cb] p-3 text-center font-semibold uppercase tracking-[1.5px] mb-5 rounded-[2px] text-[#555] text-[0.95rem]">Notes</div>
            <table class="habits-table w-full border-collapse text-[0.8rem] text-[#666]">
                <thead><tr><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem] text-left pl-2 font-bold text-[#444] w-[110px]">HABITS TASK</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">M</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">T</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">W</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">T</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">F</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">S</th><th class="bg-[#fef2e6] px-1 py-2 text-center border border-[#f6edde] font-normal text-[#999] text-[0.7rem]">S</th></tr></thead>
                <tbody>
                    <tr><td class="px-1 py-1 text-center border border-[#f6edde] text-left pl-2">Brush Teeth</td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td></tr>
                    <tr><td class="px-1 py-1 text-center border border-[#f6edde] text-left pl-2">Skincare</td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td></tr>
                    <tr><td class="px-1 py-1 text-center border border-[#f6edde] text-left pl-2">Exercise</td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td></tr>
                    <tr><td class="px-1 py-1 text-center border border-[#f6edde] text-left pl-2">Journal</td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td></tr>
                    <tr><td class="px-1 py-1 text-center border border-[#f6edde] text-left pl-2">Reading</td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td></tr>
                    <tr><td class="px-1 py-1 text-center border border-[#f6edde] text-left pl-2">Tidy Up</td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td><td class="px-1 py-1 text-center border border-[#f6edde]"><div class="check-box w-[14px] h-[14px] border border-[#bbb] rounded-[3px] inline-block cursor-pointer align-middle transition-colors"></div></td></tr>
                </tbody>
            </table>
        </div>
    </aside>
    <main class="calendar-view flex overflow-x-auto bg-[#fff7ea] [scrollbar-width:thin] snap-x snap-mandatory" id="calendarMain"></main>
</div>
<script type="module" src="js/app.js"></script>

</body>
</html>
