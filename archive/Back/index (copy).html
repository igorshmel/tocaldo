<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Planner</title>
    <style>
        :root {
            --bg-color: #FDFDFD;
            --sidebar-bg: #FFFBF8;
            --header-peach: #FFE4D6;
            --header-grey: #AFAFAF;
            --text-color: #555;
            --accent-green: #E0EEE0;
            --accent-peach: #FFDAB9;
            --accent-grey: #EAEAEA;
            --border-color: #EEE;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: #F5F5F5;
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main Container */
        .planner-container {
            background: white;
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            display: grid;
            grid-template-columns: 320px 1fr;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 8px;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        .section-header {
            background-color: var(--header-peach);
            padding: 10px;
            text-align: center;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        /* Progress Circle */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .progress-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 6px solid #F0F0F0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            position: relative;
        }
        
        .progress-lines {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .line { height: 8px; background: #FFF0E0; border-radius: 4px; width: 100%; }
        .line:nth-child(2) { width: 80%; }
        .line:nth-child(3) { width: 60%; }

        /* Task List */
        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-size: 0.9rem;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .custom-radio {
            width: 18px;
            height: 18px;
            border: 2px solid #DDD;
            border-radius: 50%;
            display: inline-block;
        }

        .task-item:hover .custom-radio {
            border-color: #CCC;
            background-color: #FAFAFA;
        }

        /* Notes Section */
        .notes-area {
            background-color: var(--header-peach);
            min-height: 100px;
            border-radius: 4px;
            padding: 10px;
            font-size: 0.9rem;
        }

        /* Habits Table */
        .habits-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .habits-table th {
            padding-bottom: 8px;
            color: #888;
            font-weight: normal;
        }

        .habits-table td {
            padding: 4px;
            border: 1px solid #EEE;
            text-align: center;
        }

        .habits-table td:first-child {
            text-align: left;
            border: none;
            padding-left: 0;
            width: 100px;
        }

        .check-box {
            width: 14px;
            height: 14px;
            border: 1px solid #CCC;
            border-radius: 2px;
            display: inline-block;
            cursor: pointer;
        }
        
        .check-box.checked {
            background-color: #AAA;
        }

        /* --- CALENDAR MAIN --- */
        .calendar-view {
            display: flex;
            overflow-x: auto;
            background-color: white;
        }

        .day-column {
            min-width: 350px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .day-header {
            background-color: var(--header-grey);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .day-header h2 {
            font-size: 1.4rem;
            font-weight: 400;
            text-transform: uppercase;
        }
        
        .day-date {
            background-color: #FFF;
            color: #AAA;
            text-align: center;
            padding: 5px;
            font-size: 0.9rem;
            border-bottom: 1px solid #EEE;
        }

        .day-subheader {
            display: grid;
            grid-template-columns: 60px 100px 1fr;
            padding: 10px 0;
            font-size: 0.8rem;
            color: #999;
            border-bottom: 1px solid #EEE;
            text-align: center;
        }

        .time-slot {
            display: grid;
            grid-template-columns: 60px 1fr;
            min-height: 50px;
            border-bottom: 1px solid #FAFAFA;
        }

        .ts-time {
            font-size: 0.75rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #F5F5F5;
        }

        .ts-content {
            padding: 4px 10px;
            display: flex;
            align-items: center;
        }

        /* Event Cards */
        .event-card {
            width: 100%;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .evt-peach { background-color: var(--accent-peach); }
        .evt-green { background-color: var(--accent-green); }
        .evt-grey { background-color: var(--accent-grey); }

        .evt-cat {
            font-weight: 500;
            margin-right: 10px;
            min-width: 70px;
        }
        
        .evt-desc {
            flex: 1;
            color: #444;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #ddd; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ccc; 
        }

    </style>
</head>
<body>

<div class="planner-container">
    <aside class="sidebar">
        
        <div>
            <div class="section-header">Weekly Tasks</div>
            
            <div class="progress-container">
                <div class="progress-circle">0%</div>
                <div class="progress-lines">
                    <div class="line"></div>
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>

            <ul class="task-list">
                <li class="task-item"><span class="custom-radio"></span> Grocery shopping</li>
                <li class="task-item"><span class="custom-radio"></span> Meal prep</li>
                <li class="task-item"><span class="custom-radio"></span> Clean linen house</li>
                <li class="task-item"><span class="custom-radio"></span> Laundry</li>
                <li class="task-item"><span class="custom-radio"></span> Grocery edit</li>
                <li class="task-item"><span class="custom-radio"></span> Workout</li>
                <li class="task-item"><span class="custom-radio"></span> Declutter house</li>
                <li class="task-item"><span class="custom-radio"></span> Self care night</li>
            </ul>
        </div>

        <div>
            <div class="section-header">Notes</div>
            <div class="notes-area">
                <div contenteditable="true" style="outline:none; color: #666;">
                    • Remember to call Mom<br>
                    • Buy gift for birthday
                </div>
            </div>
        </div>

        <div>
            <table class="habits-table">
                <thead>
                    <tr>
                        <th>HABITS TASK</th>
                        <th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Brush Teeth</td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                    </tr>
                    <tr>
                        <td>Skincare</td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                    </tr>
                     <tr>
                        <td>Exercise</td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                    </tr>
                    <tr>
                        <td>Journal</td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                        <td><div class="check-box"></div></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </aside>

    <main class="calendar-view" id="calendarMain">
        </main>
</div>

<script>
    // Configuration for the calendar
    const days = [
        { name: 'Monday', date: 'August 16, 2026' },
        { name: 'Tuesday', date: 'August 17, 2026' },
        { name: 'Wednesday', date: 'August 18, 2026' },
        { name: 'Thursday', date: 'August 19, 2026' },
        { name: 'Friday', date: 'August 20, 2026' }
    ];

    // Some sample data to mimic the image
    const scheduleData = {
        'Monday': {
            '6:30 AM': { category: 'Shower', task: 'Shower', type: 'peach' },
            '7:00 AM': { category: 'Work', task: '', type: 'green' },
            '8:00 AM': { category: 'Work', task: '', type: 'green' },
            '9:00 AM': { category: 'Work', task: '', type: 'green' },
            '12:00 PM': { category: 'Lunch', task: '', type: 'peach' },
            '1:00 PM': { category: 'Household', task: 'Tdy-up', type: 'peach' },
            '2:00 PM': { category: 'Work', task: '', type: 'green' },
            '6:00 PM': { category: 'Dinner', task: '', type: 'peach' },
            '10:00 PM': { category: 'Sleep', task: '', type: 'peach' },
        },
        'Tuesday': {
            '6:00 AM': { category: 'Car', task: '', type: 'peach' },
            '7:00 AM': { category: 'Work', task: '', type: 'green' },
            '1:00 PM': { category: 'Meeting', task: '', type: 'green' },
            '3:00 PM': { category: 'Exercise', task: '', type: 'grey' },
            '8:00 PM': { category: 'Sleep', task: '', type: 'green' }
        }
    };

    const calendarContainer = document.getElementById('calendarMain');
    const startHour = 6; // 6 AM
    const endHour = 23; // 11 PM

    // Generate columns
    days.forEach(day => {
        const column = document.createElement('div');
        column.className = 'day-column';

        // Header
        column.innerHTML = `
            <div class="day-header">
                <h2>${day.name}</h2>
            </div>
            <div class="day-date">${day.date}</div>
            <div class="day-subheader">
                <span>Time</span>
                <span>Category</span>
                <span>Task</span>
            </div>
        `;

        // Time Slots
        for (let i = startHour; i <= endHour; i++) {
            // Create full hour
            createTimeSlot(column, i, 0, day.name);
            // Create half hour (optional, to match image density if needed, 
            // but sticking to hourly/adhoc makes it cleaner. 
            // The image has 6:30, so let's check data).
            
            // Note: For this simple markup generator, I'll just check specific times in data 
            // or default to hourly slots.
            // If data has X:30, we insert it.
        }

        calendarContainer.appendChild(column);
    });

    function createTimeSlot(container, hour, minute, dayName) {
        // Format time string (e.g., 6:00 AM)
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
        const minStr = minute === 0 ? '00' : minute;
        const timeLabel = `${displayHour}:${minStr} ${ampm}`;
        
        // Special check for 6:30 AM manually just to demo
        if(hour === 6 && minute === 0) {
             renderSlot(container, timeLabel, dayName);
             renderSlot(container, "6:30 AM", dayName); // Hardcoded extra slot for demo
        } else {
             renderSlot(container, timeLabel, dayName);
        }
    }

    function renderSlot(container, timeLabel, dayName) {
        const slot = document.createElement('div');
        slot.className = 'time-slot';
        
        // Check if we have an event
        let contentHtml = '';
        const dayEvents = scheduleData[dayName];
        if (dayEvents && dayEvents[timeLabel]) {
            const ev = dayEvents[timeLabel];
            contentHtml = `
                <div class="event-card evt-${ev.type}">
                    <span class="evt-cat">${ev.category}</span>
                    <span class="evt-desc">${ev.task ? '▸ ' + ev.task : ''}</span>
                </div>
            `;
        }

        slot.innerHTML = `
            <div class="ts-time">${timeLabel}</div>
            <div class="ts-content">
                ${contentHtml}
            </div>
        `;
        container.appendChild(slot);
    }

    // Interactive Checkboxes
    document.querySelectorAll('.check-box').forEach(box => {
        box.addEventListener('click', function() {
            this.classList.toggle('checked');
        });
    });

    document.querySelectorAll('.custom-radio').forEach(radio => {
        radio.addEventListener('click', function() {
            let bg = this.style.backgroundColor;
            this.style.backgroundColor = bg === 'black' ? 'transparent' : 'black';
        });
    });

</script>

</body>
</html>
